@if (isLoading()) {
  <div class="flex flex-col items-center justify-center min-h-dvh bg-bg-main text-text-primary">
    <!-- Premium Spinner Animation -->
    <div class="relative flex items-center justify-center w-16 h-16 mb-4">
      <div class="absolute w-12 h-12 border-4 border-solid border-accent/20 rounded-full"></div>
      <div class="absolute w-12 h-12 border-4 border-solid border-accent border-t-transparent rounded-full animate-spin"></div>
    </div>
    <h2 class="text-xl font-display font-medium tracking-tight animate-pulse">Connecting to Loop...</h2>
  </div>
} @else {
  <router-outlet />
}
