<div 
  (click)="select()"
  [ngClass]="{
    'bg-bg-accent border-l-2 border-accent': isActive(),
    'hover:bg-surface-1/50': !isActive()
  }"
  class="flex items-center gap-3 p-3 border-l-2 border-transparent cursor-pointer transition-all duration-200"
>
  <!-- Avatar / Icon -->
  <app-avatar
    [photoURL]="otherProfile()?.photoURL"
    [displayName]="otherProfile()?.displayName"
    [isOnline]="otherProfile()?.isOnline ?? false"
    [isGroup]="convo.type === 'group'"
    size="md"
  ></app-avatar>

  <!-- Meta Info -->
  <div class="flex-1 min-w-0">
    <div class="flex items-baseline justify-between mb-0.5">
      <span class="text-sm font-semibold text-text-primary truncate">
        {{ convo.type === 'dm' ? (otherProfile()?.displayName || 'Loading...') : convo.groupName }}
      </span>
      <span class="text-[10px] text-text-muted flex-shrink-0">
        {{ formattedTime() }}
      </span>
    </div>

    <div class="flex items-center justify-between">
      <p class="text-xs text-text-secondary truncate pr-2 font-normal">
        {{ isClearedForMe() ? 'Chat cleared' : convo.lastMessage }}
      </p>

      <!-- Badge Indicators -->
      <div class="flex items-center gap-1.5 flex-shrink-0">
        @if (isMessageRequest()) {
          <span class="text-[9px] font-semibold bg-accent/15 text-accent px-1.5 py-0.5 rounded">
            Request
          </span>
        }
        @if (unreadCount() > 0) {
          <span class="min-w-[16px] h-4 bg-accent text-white font-bold text-[9px] flex items-center justify-center px-1 rounded-full animate-pulse">
            {{ unreadCount() }}
          </span>
        }
      </div>
    </div>
  </div>
</div>
