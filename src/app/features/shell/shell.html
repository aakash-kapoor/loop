<div class="flex w-full h-full overflow-hidden bg-bg-main">
  <!-- Sidebar (Desktop only) -->
  <div class="hidden md:flex flex-col w-[320px] lg:w-[360px] border-r border-border-light flex-shrink-0 bg-surface-0">
    <app-conversation-list [isSidebar]="true"></app-conversation-list>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col h-full overflow-hidden">
    <div class="flex-1 overflow-hidden relative">
      <router-outlet></router-outlet>
    </div>

    <!-- Bottom Navigation Bar (Mobile only, hidden inside active chat) -->
    @if (!isChatActive()) {
      <div class="md:hidden flex items-center justify-around h-16 border-t border-border-light bg-surface-0 flex-shrink-0">
        <a routerLink="/chats" routerLinkActive="text-accent" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center justify-center text-text-muted w-1/3 h-full cursor-pointer">
          <i class="ti ti-message text-xl"></i>
          <span class="text-[10px] mt-0.5 font-medium">Chats</span>
        </a>
        <a routerLink="/new" routerLinkActive="text-accent" class="flex flex-col items-center justify-center text-text-muted w-1/3 h-full cursor-pointer">
          <i class="ti ti-plus text-xl"></i>
          <span class="text-[10px] mt-0.5 font-medium">New Chat</span>
        </a>
        <a routerLink="/settings" routerLinkActive="text-accent" class="flex flex-col items-center justify-center text-text-muted w-1/3 h-full cursor-pointer">
          <i class="ti ti-settings text-xl"></i>
          <span class="text-[10px] mt-0.5 font-medium">Settings</span>
        </a>
      </div>
    }
  </div>
</div>
