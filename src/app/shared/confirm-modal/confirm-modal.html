<div 
  class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fadeIn"
  (click)="onBackdropClick($event)"
>
  <div 
    class="w-full max-w-sm bg-surface-0 border border-border-light rounded-3xl p-6 shadow-2xl animate-scaleUp flex flex-col items-center text-center gap-4 relative overflow-hidden"
    (click)="$event.stopPropagation()"
  >
    <!-- Icon Shield -->
    <div 
      class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl border mb-1"
      [ngClass]="{
        'bg-rose-500/10 text-rose-500 border-rose-500/20': type === 'danger',
        'bg-amber-500/10 text-amber-500 border-amber-500/20': type === 'warning',
        'bg-accent/10 text-accent border-accent/20': type === 'info'
      }"
    >
      @if (type === 'danger') {
        <i class="ti ti-trash"></i>
      } @else if (type === 'warning') {
        <i class="ti ti-alert-triangle"></i>
      } @else {
        <i class="ti ti-info-circle"></i>
      }
    </div>

    <!-- Title & Description -->
    <div class="flex flex-col gap-1.5">
      <h3 class="font-bold text-text-primary text-base font-display">
        {{ title }}
      </h3>
      <p class="text-xs text-text-muted leading-relaxed font-normal">
        {{ message }}
      </p>
    </div>

    <!-- Action Buttons -->
    <div class="flex items-center gap-2.5 w-full mt-2">
      <button 
        (click)="cancel.emit()" 
        [disabled]="isSubmitting"
        class="flex-1 py-2.5 px-4 rounded-2xl bg-surface-1 hover:bg-surface-2 disabled:opacity-50 text-text-secondary text-xs font-semibold border border-border-light transition-all cursor-pointer select-none active-press"
      >
        {{ cancelText }}
      </button>

      <button 
        (click)="confirm.emit()" 
        [disabled]="isSubmitting"
        [ngClass]="{
          'bg-rose-500 hover:bg-rose-600 shadow-rose-500/20': type === 'danger',
          'bg-amber-500 hover:bg-amber-600 shadow-amber-500/20': type === 'warning',
          'bg-accent hover:bg-accent-hover shadow-accent/20': type === 'info'
        }"
        class="flex-1 py-2.5 px-4 rounded-2xl text-white text-xs font-semibold transition-all shadow-md cursor-pointer disabled:opacity-50 select-none flex items-center justify-center gap-1.5 active-press"
      >
        @if (isSubmitting) {
          <i class="ti ti-loader-2 animate-spin text-sm"></i>
        }
        <span>{{ confirmText }}</span>
      </button>
    </div>
  </div>
</div>
